# DMG Finder layout defaults. package-release.sh sources this after ROOT_DIR is set.

DEFAULT_DMG_BACKGROUND_PATH="$ROOT_DIR/scripts/assets/dmg-background@4x.png"
if [[ ! -f "$DEFAULT_DMG_BACKGROUND_PATH" ]]; then
  DEFAULT_DMG_BACKGROUND_PATH="$ROOT_DIR/scripts/assets/dmg-background@2x.png"
fi

DMG_BACKGROUND_PATH="${LIMELIGHT_DMG_BACKGROUND:-$DEFAULT_DMG_BACKGROUND_PATH}"
DMG_CONTENT_WIDTH="${LIMELIGHT_DMG_CONTENT_WIDTH:-660}"
DMG_CONTENT_HEIGHT="${LIMELIGHT_DMG_CONTENT_HEIGHT:-420}"
DMG_WINDOW_WIDTH="${LIMELIGHT_DMG_WINDOW_WIDTH:-660}"
DMG_WINDOW_HEIGHT="${LIMELIGHT_DMG_WINDOW_HEIGHT:-452}"
